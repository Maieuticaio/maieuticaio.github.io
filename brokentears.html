<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broken Tears</title>

  <style>
    :root {
      --bg: #f0f0f0;
      --ink: #aaaaaa;
      --muted: #77706a;
      --line: #aaaaaa;
      --cell-min: 260px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: -0.02em;
    }

    a { color: inherit; text-decoration: none; }

    .page {
      min-height: 100vh;
      padding: clamp(20px, 4vw, 56px);
    }

    .shop-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: clamp(28px, 5vw, 72px);
    }

    .shop-title {
      margin: 0;
      font-size: clamp(34px, 8vw, 112px);
      line-height: 0.9;
      font-weight: 500;
      text-transform: uppercase;
    }

    .shop-note {
      max-width: 360px;
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      color: var(--muted);
      text-align: right;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--cell-min)), 1fr));
      gap: 1px;
      position: relative;
      background: var(--line);
    }

    .shop-cell {
      position: relative;
      min-height: clamp(340px, 46vw, 520px);
      display: grid;
      place-items: center;
      overflow: visible;
      background: var(--bg);
    }

    .cell-number {
      position: absolute;
      top: 0.18em;
      left: 0.18em;
      z-index: 2;
      display: inline-block;
      padding-right: 0.18em;
      background: var(--bg);
      font-size: clamp(34px, 5.2vw, 72px);
      line-height: 0.9;
      font-weight: 500;
      letter-spacing: -0.08em;
      font-variant-numeric: tabular-nums;
    }

    .product-link {
      width: 100%;
      height: 100%;
      padding: clamp(36px, 5vw, 72px) clamp(24px, 4vw, 56px) clamp(30px, 4vw, 48px);
      display: grid;
      grid-template-rows: 1fr auto;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    .product-media {
      width: min(72%, 320px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      align-self: end;
      transition: transform 220ms ease, filter 220ms ease;
    }

    .product-media img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .product-link:hover .product-media {
      transform: translateY(-4px) scale(1.025);
      filter: contrast(1.04);
    }

    .product-status {
      font-size: clamp(14px, 1.8vw, 22px);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      min-height: 2em;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .product-status.sold { color: var(--muted); }

    .product-page {
      display: none;
    }

    .product-page:target {
      display: block;
    }

    body:has(.product-page:target) .shop-view {
      display: none;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 32px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid currentColor;
    }

    .product-detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: clamp(28px, 5vw, 72px);
      align-items: start;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #eee7dd;
    }

    .product-info h1 {
      margin: 0 0 16px;
      font-size: clamp(38px, 7vw, 96px);
      line-height: 0.9;
      font-weight: 500;
      text-transform: uppercase;
    }

    .product-info p {
      max-width: 560px;
      font-size: 17px;
      line-height: 1.45;
      color: var(--muted);
    }

    .buy-line {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 20px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    @media (max-width: 760px) {
      .shop-header {
        display: block;
      }

      .shop-note {
        text-align: left;
        margin-top: 18px;
        margin-bottom: 70px;
      }

      .product-detail-layout {
        grid-template-columns: 1fr;
      }

      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shop-view">
      <header class="shop-header">
        <h1 class="shop-title">сломанные<br>слезы</h1>
        <p class="shop-note"></p>
      </header>

      <section class="shop-grid" aria-label="Shop products" data-products></section>
    </section>

    <section data-product-pages></section>
  </main>

  <script>

    // Чтобы добавить объект, скопируй один блок ниже, поменяй id, название, фото и текст.

        id: "01",

        detailTitle: "OBJ 01",
        description: "Сахарница поселится у Нади.",
        metaLeft: "керамика",
        metaRight: "--",
        gallery: [
          PLACEHOLDER_IMAGE,
          PLACEHOLDER_IMAGE,
          PLACEHOLDER_IMAGE,
          PLACEHOLDER_IMAGE
        ]
      },
      {
        id: "02",
        title: "перечница и солонка",
        image: "https://maieuticaio.github.io/folder/brokentears/obj/02peppersalt.png",
        detailTitle: "OBJ 02",
        description: "Соль и перец.",
        metaLeft: "керамика",
        metaRight: "--",
        gallery: [
          PLACEHOLDER_IMAGE,
          PLACEHOLDER_IMAGE
        ]
      },
      {
        id: "03",
        title: "Соусник",
        image: "https://maieuticaio.github.io/folder/brokentears/obj/03sause.png",
        detailTitle: "OBJ 03",
        description: "Баночка для соевого соуса.",
        metaLeft: "керамика",
        metaRight: "--",

          PLACEHOLDER_IMAGE,

      },
      {
        id: "04",
        title: "подсвечник",

        detailTitle: "OBJ 04",

        metaLeft: "Ванкувер",

          "https://maieuticaio.github.io/folder/brokentears/obj/02podsvechnikdoma.jpeg",

      {
        id: "05",

      {
        id: "06",

        detailTitle: "OBJ 06",

        metaLeft: "керамика",
        metaRight: "--",
        gallery: [
          PLACEHOLDER_IMAGE,
          PLACEHOLDER_IMAGE
        ]
      }
    ];

    const productGrid = document.querySelector("[data-products]");
    const productPages = document.querySelector("[data-product-pages]");

    const imageTag = (src, alt) => `<img src="${src}" alt="${alt}" loading="lazy" />`;

    productGrid.innerHTML = PRODUCTS.map((product) => `
      <article class="shop-cell">
        <span class="cell-number">${product.id}</span>
        <a class="product-link" href="#product-${product.id}" aria-label="Open product ${product.id}">
          <figure class="product-media">
            ${imageTag(product.image, `Ceramic piece ${product.id}`)}
          </figure>
          <span class="product-status">${product.title}</span>
        </a>
      </article>
    `).join("");

    productPages.innerHTML = PRODUCTS.map((product) => `
      <section id="product-${product.id}" class="product-page">
        <a class="back-link" href="#">&#8592; назад</a>
        <div class="product-detail-layout">
          <div class="gallery">
            ${product.gallery.map((src, index) => imageTag(src, `Product ${product.id} view ${index + 1}`)).join("")}
          </div>
          <aside class="product-info">
            <h1>${product.detailTitle}</h1>
            <p>${product.description}</p>
            <div class="buy-line"><span>${product.metaLeft}</span><span>${product.metaRight}</span></div>
          </aside>
        </div>
      </section>
    `).join("");
  </script>
</body>
</html>
